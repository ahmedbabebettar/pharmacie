<!DOCTYPE html>
<html lang="fr" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚗️ TEST LOCAL — Gestion de Pharmacie</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="text.css?v=44">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        #test-banner {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 99999;
            background: #f59e0b; color: #1c1917; text-align: center;
            padding: 7px; font-size: 13px; font-weight: 700; font-family: sans-serif;
            letter-spacing: 0.3px;
        }
        body { padding-top: 34px; }
    </style>

    <script>
        window.addEventListener('error', function(e) {
            if(e.lineno === 0 || e.message === 'Script error.') return;
            let banner = document.getElementById('critical-error-banner');
            if(!banner) {
                banner = document.createElement('div');
                banner.id = 'critical-error-banner';
                banner.style = "position:fixed;top:34px;left:0;width:100%;background:#ef4444;color:white;text-align:center;padding:10px;z-index:9998;font-weight:bold;font-family:sans-serif;";
                document.body.prepend(banner);
            }
            banner.textContent = '⚠️ Erreur (L.' + e.lineno + '): ' + e.message;
        });
    </script>
</head>

<body>
    <div id="test-banner">⚗️ MODE TEST LOCAL — Base de données isolée — Aucun impact sur le site live</div>

    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-card glass-effect">
            <div class="login-header">
                <div class="brand-icon mx-auto"><i class="fa-solid fa-pills"></i></div>
                <h2 data-i18n="login_title">Connexion Responsable</h2>
                <p data-i18n="login_subtitle">Gestion de Stock & Patients</p>
            </div>
            <form id="login-form" onsubmit="event.preventDefault(); if(typeof window.attemptLogin === 'function') { window.attemptLogin(); }">
                <div class="form-group">
                    <label data-i18n="login_user">Email Utilisateur</label>
                    <input type="text" id="login-user" required placeholder="admin@test.local">
                </div>
                <div class="form-group" style="margin-bottom: 24px;">
                    <label data-i18n="login_pass">Mot de passe</label>
                    <input type="password" id="login-pass" required placeholder="123456">
                </div>
                <div id="login-error" style="color: var(--danger-red); font-size: 0.85rem; margin-bottom: 16px; display: none; text-align: center;" data-i18n="login_error">Identifiants incorrects!</div>
                <button type="submit" class="primary-btn full-width" style="justify-content: center;" data-i18n="login_btn">Connexion</button>
            </form>
        </div>
    </div>

    <!-- Main App Layout -->
    <div class="app-layout" id="main-app" style="display: none;">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon"><i class="fa-solid fa-pills"></i></div>
                <div class="brand-text">
                    <h2 data-i18n="brand_title">Gestion des Pharmacies</h2>
                    <h2 data-i18n="brand_subtitle">MASEF</h2>
                </div>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" data-view="dashboard"><i class="fa-solid fa-table-cells-large"></i> <span data-i18n="nav_dashboard">Tableau de bord</span></button>
                <button class="nav-btn" data-view="central"><i class="fa-solid fa-server"></i> <span data-i18n="nav_central">Stock Central</span></button>
                <button class="nav-btn" data-view="distribution"><i class="fa-solid fa-truck-moving"></i> <span data-i18n="nav_distribution">Distribution</span></button>
                <button class="nav-btn" data-view="admin_orders"><i class="fa-solid fa-cart-arrow-down"></i> <span data-i18n="nav_admin_orders">Commandes</span></button>
                <button class="nav-btn admin-only" data-view="admin_returns"><i class="fa-solid fa-rotate-left"></i> <span>Retours (P)</span></button>
                <button class="nav-btn" data-view="patients"><i class="fa-regular fa-user"></i> <span data-i18n="nav_patients">Patients</span></button>
                <button class="nav-btn" data-view="records"><i class="fa-solid fa-clipboard-list"></i> <span data-i18n="nav_reports">Registres</span></button>
                <button class="nav-btn" data-view="expired"><i class="fa-solid fa-calendar-xmark"></i> <span>Périmés</span></button>
                <button class="nav-btn" data-view="reports"><i class="fa-solid fa-file-lines"></i> <span data-i18n="nav_history">Rapports</span></button>
                <button class="nav-btn admin-only" data-view="admin_decharges"><i class="fa-solid fa-file-signature"></i> <span>Décharges (Historique)</span></button>
                <div class="nav-divider" style="height:1px; background:#e5e7eb; margin:10px 0;"></div>
                <div class="nav-group-title" style="padding:10px 20px;font-size:11px;text-transform:uppercase;color:#94a3b8;font-weight:800;letter-spacing:1px;" data-pharmacy-only style="display:none;">Mon Registre</div>
                <button class="nav-btn" data-view="pharm-inbox" data-pharmacy-only style="display:none;"><i class="fa-solid fa-inbox"></i> <span>Décharges</span></button>
                <button class="nav-btn" data-view="pharm-order" data-pharmacy-only style="display:none;"><i class="fa-solid fa-cart-arrow-down"></i> <span>Approvisionnement</span></button>
                <button class="nav-btn" data-view="pharm-dispense" data-pharmacy-only style="display:none;"><i class="fa-solid fa-hand-holding-medical"></i> <span>Délivrances</span></button>
                <div class="nav-divider" data-pharmacy-only style="height:1px;background:#e5e7eb;margin:10px 0;display:none;"></div>
                <div id="dynamic-pharmacies-sidebar"></div>
                <button class="nav-btn admin-only" data-view="analytical_reports"><i class="fa-solid fa-chart-line"></i> <span data-i18n="nav_analyses">Analyses & Rapports</span></button>
                <button class="nav-btn admin-only" data-view="manage_pharmacies"><i class="fa-solid fa-hospital-user"></i> <span>Gérer les Pharmacies</span></button>
                <button class="nav-btn admin-only" data-view="users"><i class="fa-solid fa-users-gear"></i> <span>Gérer les Utilisateurs</span></button>
                <button class="nav-btn pharmacy-only" data-view="my_register"><i class="fa-solid fa-book-medical"></i> <span data-i18n="nav_my_register">Mon Registre</span></button>
            </nav>
            <div class="user-profile-sidebar">
                <div class="user-avatar">
                    <i class="fa-solid fa-circle-user fa-2x"></i>
                    <div class="user-info">
                        <strong id="display-user-name">-</strong>
                        <span id="display-user-role">-</span>
                        <button class="settings-mini-btn" onclick="window.openRecoveryModal()" title="Sécurité du compte"><i class="fa-solid fa-shield-halved"></i> <span data-i18n="secure_account">Sécuriser</span></button>
                        <button class="settings-mini-btn" onclick="window.logout()" title="Déconnexion" style="color:#ef4444;margin-top:5px;"><i class="fa-solid fa-arrow-right-from-bracket"></i> <span data-i18n="logout">Déconnexion</span></button>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-content">
                    <h1 id="page-title">Dashboard</h1>
                    <div style="display:flex;align-items:center;gap:15px;">
                        <div id="sync-status-indicator" class="sync-status"><i class="fa-solid fa-cloud"></i> <span id="sync-stat-text">Prêt</span></div>
                        <div class="date-display" id="date-display"></div>
                    </div>
                </div>
            </header>
            <div id="view-container" class="view-container"></div>
        </main>
    </div>

    <!-- Modals (identiques à index.html) -->
    <div id="add-medicine-modal" class="modal-overlay"><div class="modal-content"><div class="modal-header"><h3 data-i18n="add_med_title">Ajouter Médicament</h3><button class="close-modal" onclick="document.getElementById('add-medicine-modal').classList.remove('active')"><i class="fa-solid fa-xmark"></i></button></div><form id="add-medicine-form"><div class="form-group" style="margin-bottom:12px;"><label data-i18n="add_med_name">Nom</label><input type="text" id="med-name" list="med-names-datalist" required><datalist id="med-names-datalist"></datalist></div><div class="form-group" style="margin-bottom:12px;"><label data-i18n="add_med_batch">Lot</label><input type="text" id="med-batch" required></div><div class="form-group" style="margin-bottom:12px;"><label data-i18n="add_med_qty">Quantité</label><input type="number" id="med-qty" min="1" required></div><div class="form-group" style="margin-bottom:12px;"><label data-i18n="add_med_entry">Date entrée</label><input type="date" id="med-entry" required></div><div class="form-group" style="margin-bottom:12px;"><label data-i18n="add_med_expiry">Expiration</label><input type="date" id="med-expiry" required></div><div class="form-group" style="margin-bottom:24px;"><label data-i18n="add_med_price">Prix</label><input type="number" id="med-price" step="any" min="0" placeholder="0.00"></div><button type="submit" class="primary-btn full-width" style="justify-content:center;" data-i18n="add_med_btn">Ajouter</button></form></div></div>
    <div id="patient-modal" class="modal-overlay"><div class="modal-content"><div class="modal-header"><h3 id="patient-modal-title">Patient</h3><button class="close-modal" onclick="document.getElementById('patient-modal').classList.remove('active')"><i class="fa-solid fa-xmark"></i></button></div><form id="patient-form"><input type="hidden" id="patient-id"><div class="form-group" style="margin-bottom:12px;"><label>Nom complet</label><input type="text" id="patient-name-input" required></div><div class="form-group" style="margin-bottom:12px;"><label>N° National</label><input type="text" id="patient-nid-input"></div><div class="form-group" style="margin-bottom:12px;"><label>Téléphone</label><input type="tel" id="patient-phone-input"></div><div class="form-group" style="margin-bottom:24px;"><label>Hôpital</label><input type="text" id="patient-hospital-input"></div><button type="submit" class="primary-btn full-width" style="justify-content:center;background:var(--primary-brand);"><i class="fa-solid fa-save"></i> Enregistrer</button></form></div></div>
    <div id="user-modal" class="modal-overlay"><div class="modal-content" style="max-width:400px;"><div class="modal-header"><h3 id="user-modal-title">Utilisateur</h3><button class="close-modal" onclick="document.getElementById('user-modal').classList.remove('active')"><i class="fa-solid fa-xmark"></i></button></div><form id="user-form"><input type="hidden" id="user-old-email"><input type="hidden" id="user-id"><div class="form-group" style="margin-bottom:12px;"><label>Nom (FR)</label><input type="text" id="user-name-fr-input" required></div><div class="form-group" style="margin-bottom:12px;"><label>الاسم (AR)</label><input type="text" id="user-name-ar-input"></div><div class="form-group" style="margin-bottom:12px;"><label>Email</label><input type="email" id="user-email-input" required></div><div class="form-group" style="margin-bottom:12px;"><label>Mot de passe</label><input type="password" id="user-pass-input"></div><div class="form-group" style="margin-bottom:12px;"><label>Rôle</label><select id="user-role-input" onchange="document.getElementById('user-pharm-group').style.display=(this.value==='pharmacy'?'block':'none')"><option value="pharmacy">Pharmacy</option><option value="manager">Manager</option><option value="admin">Admin</option></select></div><div class="form-group" id="user-pharm-group" style="margin-bottom:24px;"><label>Pharmacie</label><select id="user-pharm-input"></select></div><button type="submit" class="primary-btn full-width" style="justify-content:center;background:var(--primary-brand);padding:12px;"><i class="fa-solid fa-user-check"></i> Enregistrer</button></form></div></div>
    <div id="custom-dialog-modal" class="modal-overlay"><div class="modal-content" style="max-width:340px;text-align:center;padding:24px;"><div id="dialog-icon" style="font-size:2.5rem;margin-bottom:16px;color:var(--primary-brand);"><i class="fa-solid fa-circle-question"></i></div><h3 id="dialog-title" style="margin-bottom:10px;font-size:1.1rem;">Message</h3><p id="dialog-msg" style="color:var(--text-muted);margin-bottom:20px;font-size:0.85rem;line-height:1.4;">...</p><div id="dialog-input-container" style="display:none;margin-bottom:20px;"><input type="text" id="dialog-input" style="text-align:center;border-width:2px;padding:8px;"></div><div style="display:flex;gap:10px;justify-content:center;"><button id="dialog-cancel-btn" class="primary-btn" style="background:#f1f5f9;color:#64748b;font-size:0.8rem;padding:8px 16px;">Annuler</button><button id="dialog-confirm-btn" class="primary-btn" style="font-size:0.8rem;padding:8px 16px;">Confirmer</button></div></div></div>

    <!-- Patient History Modal -->
    <div id="patient-history-modal" class="modal-overlay" onclick="if(event.target===this)this.classList.remove('active')">
        <div class="modal-content" style="max-width:750px;width:95%;">
            <div class="modal-header">
                <h3 id="patient-history-title" style="display:flex;align-items:center;gap:10px;">
                    <i class="fa-solid fa-clock-rotate-left" style="color:var(--primary-brand);"></i>
                    <span>Historique</span>
                </h3>
                <button class="close-modal" onclick="document.getElementById('patient-history-modal').classList.remove('active')">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div id="patient-history-body" style="padding:0 4px;"></div>
        </div>
    </div>

    <!-- Scripts : Supabase → override local → app -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
    <script src="override-local.js"></script>
    <script src="app.js?v=172"></script>
</body>
</html>
